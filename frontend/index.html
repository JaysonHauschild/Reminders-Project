<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reminders App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1 id="header-title">Reminders App</h1>
    <h3 id="reminders-title">Your reminders:</h3>
    <div id="reminders-container">
        <h4 id="no-reminders">No reminders yet. Add one below!</h4>
        <div id="reminders-list"></div>
        <form id="reminder-form">
            <input type="text" id="reminder-input" placeholder="Enter a new reminder" required>
            <button type="submit" id="add-reminder-button">Add Reminder</button>
        </form>
    </div>
    <script src="app.js"></script>
</html>
